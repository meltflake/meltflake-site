<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="8" fill="#fafafa"/>
  <!-- geometric snowflake, dark on light to match site bg -->
  <g stroke="#333" stroke-width="2.8" stroke-linecap="round" fill="none">
    <!-- 6 main axes -->
    <line x1="32" y1="8" x2="32" y2="56"/>
    <line x1="11.2" y1="20" x2="52.8" y2="44"/>
    <line x1="11.2" y1="44" x2="52.8" y2="20"/>
    <!-- branches on vertical axis -->
    <line x1="32" y1="16" x2="24" y2="12"/>
    <line x1="32" y1="16" x2="40" y2="12"/>
    <line x1="32" y1="48" x2="24" y2="52"/>
    <line x1="32" y1="48" x2="40" y2="52"/>
    <!-- branches on diagonal axes -->
    <line x1="19" y1="24.5" x2="15" y2="30"/>
    <line x1="19" y1="24.5" x2="22" y2="18"/>
    <line x1="45" y1="39.5" x2="49" y2="34"/>
    <line x1="45" y1="39.5" x2="42" y2="46"/>
    <line x1="19" y1="39.5" x2="15" y2="34"/>
    <line x1="19" y1="39.5" x2="22" y2="46"/>
    <line x1="45" y1="24.5" x2="49" y2="30"/>
    <line x1="45" y1="24.5" x2="42" y2="18"/>
  </g>
  <!-- center dot -->
  <circle cx="32" cy="32" r="3" fill="#333"/>
</svg>
